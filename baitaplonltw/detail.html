<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Sản phẩm - PCZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background-color: #121212;
        }

        .text-neon {
            color: #00ffcc;
        }

        .spec-table {
            background-color: #1e1e1e;
            border: 1px solid #333;
        }

        .btn-buy {
            background-color: #ff003c;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 mb-4 text-center">
                <img src="https://via.placeholder.com/500x500" class="img-fluid border border-secondary p-2"
                    alt="Product Image">
            </div>

            <div class="col-md-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="products.html">Sản phẩm</a></li>
                        <li class="breadcrumb-item active">VGA</li>
                    </ol>
                </nav>
                <h1 class="text-white mb-3">Card Đồ Họa RTX 4090 24GB</h1>
                <p class="text-muted">Thương hiệu: NVIDIA | Tình trạng: <span class="text-success">Còn hàng</span></p>
                <h2 class="text-danger fw-bold mb-4">45,000,000 đ</h2>

                <div class="mb-4">
                    <label class="form-label text-white">Số lượng:</label>
                    <input type="number" class="form-control d-inline-block w-25 bg-dark text-white border-secondary"
                        value="1">
                </div>

                <button class="btn btn-buy w-100 py-3 mb-3"><i class="fa-solid fa-cart-shopping"></i> THÊM VÀO GIỎ
                    HÀNG</button>
                <button class="btn btn-outline-light w-100 py-3">MUA NGAY</button>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <h3 class="text-neon mb-4">THÔNG SỐ KỸ THUẬT</h3>
                <table class="table table-bordered spec-table text-white">
                    <tbody>
                        <tr>
                            <th class="w-25 bg-dark">Vi xử lý (CPU)</th>
                            <td>Hỗ trợ đời mới nhất</td>
                        </tr>
                        <tr>
                            <th class="bg-dark">Đồ họa (GPU)</th>
                            <td>NVIDIA RTX 4090</td>
                        </tr>
                        <tr>
                            <th class="bg-dark">Bộ nhớ (RAM)</th>
                            <td>24GB GDDR6X</td>
                        </tr>
                        <tr>
                            <th class="bg-dark">Lưu trữ</th>
                            <td>SSD NVMe Gen 4</td>
                        </tr>
                        <tr>
                            <th class="bg-dark">Nguồn (PSU)</th>
                            <td>Khuyên dùng 1000W</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
