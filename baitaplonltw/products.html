<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Sản phẩm - PCZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background-color: #121212;
        }

        .text-neon {
            color: #00ffcc;
        }

        .product-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: #00ffcc;
            transform: translateY(-5px);
        }

        .filter-section {
            background-color: #1e1e1e;
            padding: 20px;
            border: 1px solid #333;
        }

        .btn-gaming {
            background-color: #ff003c;
            color: white;
            border-radius: 0;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container">
            <a class="navbar-brand text-neon fw-bold fs-3" href="index.html"><i class="fa-solid fa-microchip"></i>
                PCZone</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Sản phẩm</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="filter-section">
                    <h5 class="text-neon mb-3">DANH MỤC</h5>
                    <div class="form-check mb-2"><input class="form-check-input" type="checkbox"> <label
                            class="form-check-label">CPU</label></div>
                    <div class="form-check mb-2"><input class="form-check-input" type="checkbox"> <label
                            class="form-check-label">VGA (GPU)</label></div>
                    <div class="form-check mb-4"><input class="form-check-input" type="checkbox"> <label
                            class="form-check-label">RAM</label></div>

                    <h5 class="text-neon mb-3">THƯƠNG HIỆU</h5>
                    <div class="form-check mb-2"><input class="form-check-input" type="checkbox"> <label
                            class="form-check-label">ASUS</label></div>
                    <div class="form-check mb-2"><input class="form-check-input" type="checkbox"> <label
                            class="form-check-label">MSI</label></div>
                    <div class="form-check mb-4"><input class="form-check-input" type="checkbox"> <label
                            class="form-check-label">GIGABYTE</label></div>

                    <button class="btn btn-gaming w-100">ÁP DỤNG LỌC</button>
                </div>
            </div>

            <div class="col-md-9">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card product-card h-100 p-3 text-center">
                            <img src="https://via.placeholder.com/200" class="card-img-top mb-3" alt="Product">
                            <h6 class="text-white">RTX 4090 Gaming X Trio</h6>
                            <p class="text-danger fw-bold">45,000,000 đ</p>
                            <a href="detail.html" class="btn btn-outline-info btn-sm rounded-0">Chi tiết</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
